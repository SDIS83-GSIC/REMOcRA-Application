# Configuration SonarQube pour Remocra v3
sonar.projectKey=remocra-v3
sonar.projectName=Remocra v3

# Encodage des fichiers source
sonar.sourceEncoding=UTF-8

# ===========================
# Exclusions globales
# ===========================

# Fichiers générés et bibliothèques
sonar.exclusions=\
  **/build/**,\
  **/node_modules/**,\
  **/dist/**,\
  **/target/**,\
  **/.gradle/**,\
  **/gradle/**,\
  **/*.jar,\
  **/*.war,\
  **/*.class

# Exclusions de la couverture
sonar.coverage.exclusions=\
  **/build/**,\
  **/test/**,\
  **/pgTest/**,\
  db/src/main/jooq/**,\
  frontend/src/**/*.d.ts,\
  **/*Test.kt,\
  **/*Test.java,\
  **/*Tests.kt,\
  **/*Tests.java

# ===========================
# Configuration Application
# ===========================

# Modules Kotlin/Java
sonar.modules=app,db,frontend

# Module app
app.sonar.projectName=Remocra v3 - Application
app.sonar.sources=src/main/kotlin,src/main/resources
app.sonar.tests=src/test,src/pgTest
app.sonar.java.binaries=build/classes
app.sonar.java.libraries=build/libs/**/*.jar
app.sonar.java.source=21

# Module db
db.sonar.projectName=Remocra v3 - Database
db.sonar.sources=src/main/kotlin,src/main/resources
db.sonar.exclusions=src/main/jooq/**

# Module frontend
frontend.sonar.projectName=Remocra v3 - Client
frontend.sonar.sources=src
frontend.sonar.exclusions=\
  src/**/*.d.ts
frontend.sonar.typescript.tsconfigPath=tsconfig.json

# ===========================
# Rapports de tests
# ===========================

# JUnit pour Kotlin/Java (chemins relatifs à chaque module)
app.sonar.junit.reportPaths=build/test-results/test,build/test-results/pgTest
db.sonar.junit.reportPaths=build/test-results/test


